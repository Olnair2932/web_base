<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff69b4">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kellen do Crochê</title>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#ffc0cb;
  color:#333;
}

header{
  background:#ff69b4;
  color:white;
  text-align:center;
  padding:30px;
}

.produtos{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:30px;
}

.card{
  background:white;
  width:280px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
  padding:15px;
  text-align:center;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.preco{
  font-size:22px;
  color:#ff69b4;
  font-weight:bold;
}

button{
  background:#ff1493;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  margin-top:5px;
}

button:hover{
  background:#c71585;
}

/* BOTÃO VOLTAR AO TOPO */
#topBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff1493;
  color: white;
  border: none;
  padding: 12px 15px;
  border-radius: 50px;
  cursor: pointer;
  display: none;
  z-index: 999;
}

/* BOTÃO COMPARTILHAR */
#shareBtn {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: #ff69b4;
  color: white;
  border: none;
  padding: 12px 15px;
  border-radius: 50px;
  cursor: pointer;
  z-index: 999;
}
</style>

</head>

<body>

<header>
<h1>Kellen do Crochê</h1>
<p>Peças artesanais feitas com amor 💖</p>
</header>

<section class="produtos">

<div class="card">
<img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf" alt="Bolsa de Crochê">

<h2>Bolsa de Crochê Premium</h2>
<p class="preco">R$ 89,90</p>

<a href="https://wa.me/5551984578173?text=Quero%20comprar%20a%20Bolsa%20de%20Crochê" target="_blank">
<button>Comprar por WhatsApp</button>
</a>
</div>

<div class="card">
<h2>Sousplat Artesanal</h2>
<p class="preco">R$ 29,90</p>

<a href="https://wa.me/5551984578173?text=Quero%20comprar%20o%20Sousplat%20Artesanal" target="_blank">
<button>Comprar por WhatsApp</button>
</a>
</div>

<div class="card">
<h2>Tapete de Crochê</h2>
<p class="preco">R$ 149,90</p>

<a href="https://wa.me/5551984578173?text=Quero%20comprar%20o%20Tapete%20de%20Crochê" target="_blank">
<button>Comprar por WhatsApp</button>
</a>
</div>

</section>

<!-- BOTÕES FLUTUANTES -->
<button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
↑ Topo
</button>

<button id="shareBtn">Compartilhar</button>

<script>
// botão voltar ao topo
window.onscroll = function () {
  const btn = document.getElementById("topBtn");

  if (document.documentElement.scrollTop > 200) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
};

// compartilhar site (Android / Web Share API)
document.getElementById("shareBtn").addEventListener("click", async () => {
  const shareData = {
    title: "Kellen do Crochê",
    text: "Confira essas peças artesanais incríveis 💖",
    url: window.location.href
  };

  if (navigator.share) {
    try {
      await navigator.share(shareData);
    } catch (err) {
      console.log("Compartilhamento cancelado", err);
    }
  } else {
    alert("Seu navegador não suporta compartilhamento nativo.");
  }
});
</script>

</body>
</html>
