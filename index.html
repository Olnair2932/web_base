<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff69b4">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
    
    <title>Kellen do Crochê | Catálogo Oficial</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #ffc0cb; padding-bottom: 120px; }
        header { background: #ff69b4; color: white; text-align: center; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Carrossel */
        .carousel-container { position: relative; max-width: 90%; margin: 15px auto; overflow: hidden; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
        .carousel-slides { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide { min-width: 100%; position: relative; }
        .slide img { width: 100%; height: 250px; object-fit: cover; }
        .slide-caption { position: absolute; bottom: 0; background: rgba(255, 105, 180, 0.8); color: white; width: 100%; padding: 8px; text-align: center; font-weight: bold; }
        
        /* Grid de Produtos */
        .produtos { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 15px; }
        .card { background: white; width: 320px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); padding: 15px; text-align: center; }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 15px; }
        .preco { font-size: 24px; color: #ff69b4; font-weight: bold; margin: 12px 0; }
        
        /* Botões Interativos */
        button { background: #ff1493; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .btn-interacao { display: flex; gap: 8px; margin-top: 10px; }
        .like-btn { background: #fff; color: #ff1493; border: 2px solid #ff1493; flex: 0.3; border-radius: 12px; }
        .like-btn.liked { background: #ff1493; color: #fff; }

        /* Mural de Comentários Reintegrado */
        #secao-comentarios { max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; }
        #secao-comentarios h3 { color: #ff69b4; text-align: center; margin-top: 0; }
        textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; resize: none; box-sizing: border-box; margin-bottom: 10px; font-family: inherit; }
        .comentario-item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; color: #444; }
        .comentario-item:last-child { border: none; }
        
        /* Botões Flutuantes SRE */
        #topBtn, #shareBtn { position: fixed; right: 20px; border: none; border-radius: 50%; cursor: pointer; z-index: 1000; color: white; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s; }
        #topBtn { bottom: 20px; background: #ff1493; display: none; }
        #shareBtn { bottom: 85px; background: #4267B2; }
    </style>
</head>
<body>

<header>
    <h1>Kellen do Crochê</h1>
    <p>Arte e Engenharia em cada ponto 🧶</p>
</header>

<div class="carousel-container">
    <div class="carousel-slides" id="carousel">
        <div class="slide"><img src="https://images.unsplash.com/photo-1621419350937-be418043685f?q=80&w=800" alt="Bolsa"><div class="slide-caption">Bolsas Artesanais</div></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1606760227091-3dd870d97f1d?q=80&w=800" alt="Trilho"><div class="slide-caption">Decoração Boho</div></div>
    </div>
</div>

<section class="produtos" id="app"></section>

<!-- Mural de Comentários Voltou! -->
<section id="secao-comentarios">
    <h3>Mural de Clientes</h3>
    <textarea id="texto-comentario" rows="3" placeholder="Deixe um elogio para a Kellen..."></textarea>
    <button onclick="postarComentario()">Publicar Elogio</button>
    <div id="mural-comentarios" style="margin-top:15px;"></div>
</section>

<button id="topBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>
<button id="shareBtn" onclick="compartilhar()">🔗</button>

<script>
    // Registro do PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Ativo"));
    }

    const produtos = [
        { id: 1, nome: "Bolsa de Crochê Premium", preco: "R$ 89,90", img: "https://images.unsplash.com/photo-1618354691373-d851c5c3a990?q=80&w=500" },
        { id: 2, nome: "Tapete Artesanal Boho", preco: "R$ 55,00", img: "https://images.unsplash.com/photo-1597733153607-009d363b9561?q=80&w=500" },
        { id: 3, nome: "Trilho de Mesa Rosa", preco: "R$ 75,00", img: "https://images.unsplash.com/photo-1628191137573-2287233a73a5?q=80&w=500" },
        { id: 4, nome: "Sousplat Encanto", preco: "R$ 35,00", img: "https://images.unsplash.com/photo-1555529721-715365526017?q=80&w=500" }
    ];

    let likesSalvos = JSON.parse(localStorage.getItem('kellen_likes')) || {};
    const app = document.getElementById('app');

    // Renderizar Produtos
    produtos.forEach(p => {
        const isLiked = likesSalvos[p.id] ? 'liked' : '';
        app.innerHTML += `
            <div class="card">
                <img src="${p.img}" alt="${p.nome}">
                <h3>${p.nome}</h3>
                <div class="preco">${p.preco}</div>
                <div class="btn-interacao">
                    <button class="like-btn ${isLiked}" onclick="toggleLike(this, ${p.id})">♥</button>
                    <button onclick="window.location.href='https://wa.me/5551984578173?text=Olá!%20Vi%20no%20catálogo%20e%20quero:%20${encodeURIComponent(p.nome)}'">Comprar</button>
                </div>
            </div>`;
    });

    function toggleLike(btn, id) {
        btn.classList.toggle('liked');
        likesSalvos[id] = btn.classList.contains('liked');
        localStorage.setItem('kellen_likes', JSON.stringify(likesSalvos));
    }

    // Carrossel Automático
    let slideIdx = 0;
    setInterval(() => {
        const carousel = document.getElementById('carousel');
        if(carousel) {
            slideIdx = (slideIdx + 1) % 2;
            carousel.style.transform = `translateX(-${slideIdx * 100}%)`;
        }
    }, 4000);

    // Sistema de Comentários com Persistência
    function postarComentario() {
        const txt = document.getElementById('texto-comentario');
        if(!txt.value.trim()) return;
        let lista = JSON.parse(localStorage.getItem('kellen_coments')) || [];
        lista.unshift(txt.value);
        localStorage.setItem('kellen_coments', JSON.stringify(lista));
        txt.value = "";
        renderComents();
    }

    function renderComents() {
        const mural = document.getElementById('mural-comentarios');
        let lista = JSON.parse(localStorage.getItem('kellen_coments')) || [];
        mural.innerHTML = lista.map(c => `<div class="comentario-item">⭐ ${c}</div>`).join('');
    }

    function compartilhar() {
        if (navigator.share) navigator.share({ title: 'Kellen do Crochê', url: window.location.href });
        else alert('Link copiado!');
    }

    window.onscroll = () => document.getElementById("topBtn").style.display = window.scrollY > 300 ? "flex" : "none";
    
    // Inicializar mural
    renderComents();
</script>
</body>
</html>
